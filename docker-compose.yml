# VAPT Secure WordPress Development Environment
# Quick Start: docker-compose up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f wordpress

version: '3.8'

services:
  # WordPress with PHP 8.1
  wordpress:
    image: wordpress:php8.1-apache
    container_name: vaptsecure-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: vaptsecure_dev
      WORDPRESS_DB_USER: vaptsecure_user
      WORDPRESS_DB_PASSWORD: vaptsecure_pass
      WORDPRESS_DEBUG: 1
      # WP Config settings
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
    volumes:
      # Mount plugin code into WordPress
      - .:/var/www/html/wp-content/plugins/vaptsecure:rw
      # Persist uploads
      - wordpress_uploads:/var/www/html/wp-content/uploads
      # Custom php.ini overrides
      - ./docker/php.ini:/usr/local/etc/php/conf.d/vaptsecure.ini:ro
    networks:
      - vaptsecure_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-admin/install.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MariaDB Database
  db:
    image: mariadb:10.6
    container_name: vaptsecure-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: vaptsecure_dev
      MYSQL_USER: vaptsecure_user
      MYSQL_PASSWORD: vaptsecure_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - vaptsecure_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  # phpMyAdmin (optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: vaptsecure-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: vaptsecure_user
      PMA_PASSWORD: vaptsecure_pass
      PMA_ARBITRARY: 0
    networks:
      - vaptsecure_network
    depends_on:
      - db

  # MailHog (for testing emails)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: vaptsecure-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    networks:
      - vaptsecure_network

  # Redis (for testing transient caching)
  redis:
    image: redis:7-alpine
    container_name: vaptsecure-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vaptsecure_network

volumes:
  db_data:
  wordpress_uploads:
  redis_data:

networks:
  vaptsecure_network:
    driver: bridge
