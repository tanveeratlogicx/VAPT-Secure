; VAPT Secure Development PHP Configuration
; Place custom PHP settings here

; Error Reporting
display_errors = On
log_errors = On
error_log = /var/www/html/wp-content/debug.log
error_reporting = E_ALL

; Memory Limits
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Opcache settings for development
opcache.enable = 0
opcache.enable_cli = 0

; Session settings
session.gc_maxlifetime = 86400
session.cookie_lifetime = 86400

; Timezone (set explicitly)
date.timezone = UTC

; File uploads
file_uploads = On
max_file_uploads = 20

; Extensions loaded by Docker image, but keeping for reference
; extension=mysqli
; extension=gd
; extension=imagick
; extension=mbstring
; extension=openssl
; extension=zip
; extension=json
